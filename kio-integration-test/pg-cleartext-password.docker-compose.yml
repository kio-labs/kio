services:
  postgres-tls:
    build:
      context: .
      dockerfile: postgres-tls.Dockerfile

    ports:
      - "15432:5432"

    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: test_database
      POSTGRES_HOST_AUTH_METHOD: password

    command:
      - postgres
      - -c
      - ssl=on
      - -c
      - ssl_cert_file=/var/lib/postgresql/server.crt
      - -c
      - ssl_key_file=/var/lib/postgresql/server.key

    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U test_user -d test_database
      interval: 1s
      timeout: 5s
      retries: 30