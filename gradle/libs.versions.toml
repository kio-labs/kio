[versions]
kotlin = "2.4.0"
kotlinx-io = "0.9.0"
kotlinxCoroutines = "1.10.2"
hash = "0.5.6"
serialization = "1.11.0"
kotlinxDatetime = "0.8.0"
ktorHttp = "3.5.0"

[libraries]
kotlinx-io = { group = "org.jetbrains.kotlinx", name = "kotlinx-io-core", version.ref = "kotlinx-io" }
kotlinx-coroutines-core = { group = "org.jetbrains.kotlinx", name = "kotlinx-coroutines-core", version.ref = "kotlinxCoroutines" }
hash-md5 = { group = "org.kotlincrypto.hash", name = "md5", version.ref = "hash" }
hash-sha1 = { group = "org.kotlincrypto.hash", name = "sha1", version.ref = "hash" }
kotlinx-coroutines-test = { group = "org.jetbrains.kotlinx", name = "kotlinx-coroutines-test", version.ref = "kotlinxCoroutines" }
kotlin-test = { group = "org.jetbrains.kotlin", name = "kotlin-test", version.ref = "kotlin" }
kotlinx-serialization-core = { group = "org.jetbrains.kotlinx", name = "kotlinx-serialization-core", version.ref = "serialization" }
kotlinx-datetime = { group = "org.jetbrains.kotlinx", name = "kotlinx-datetime", version.ref = "kotlinxDatetime" }
ktor-http = { group = "io.ktor", name = "ktor-http", version.ref = "ktorHttp" }

[plugins]
kotlinMultiplatform = { id = "org.jetbrains.kotlin.multiplatform", version.ref = "kotlin" }
serialization = { id = "org.jetbrains.kotlin.plugin.serialization", version.ref = "kotlin" }
