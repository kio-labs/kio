name: Test

on:
  pull_request:
    branches: [ "main" ]

  workflow_dispatch:

jobs:
  publish:
    name: Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pgx_test
          POSTGRES_HOST_AUTH_METHOD: password
        ports:
          - 5432:5432

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: linuxX64Test
        run: ./gradlew :kio-integration-test:linuxX64Test
        env:
          POSTGRES_HOST: 127.0.0.1
          POSTGRES_PORT: "5432"
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pgx_test

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linuxX64-test-report
          path: |
            kio-integration-test/build/reports/tests/linuxX64Test/
