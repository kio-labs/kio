name: LinuxX64 Test

on:
  pull_request:
    branches: [ "main" ]

  workflow_dispatch:

jobs:
  publish:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: linuxX64Test
        run: ./gradlew :kio-async:poller-test:linuxX64Test :kio-http:linuxX64Test
